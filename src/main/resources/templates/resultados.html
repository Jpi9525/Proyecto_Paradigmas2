<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Resultados de ventas</title>
    <style>
        * { box-sizing: border-box; }
        body {
            font-family: system-ui, -apple-system, "Segoe UI", Roboto, sans-serif;
            background: #f3f4f6;
            margin: 0;
            padding: 2rem 1.5rem;
            color: #111827;
        }
        .wrap { max-width: 880px; margin: 0 auto; }
        h1 { font-size: 1.4rem; margin: 0 0 1.25rem; }

        /* Tarjetas con los datos calculados por los HILOS */
        .stats { display: flex; flex-wrap: wrap; gap: 1rem; margin-bottom: 1.75rem; }
        .stat {
            flex: 1 1 180px;
            background: #fff;
            border-radius: 12px;
            padding: 1rem 1.2rem;
            box-shadow: 0 6px 18px rgba(0, 0, 0, .06);
        }
        .stat .lbl { font-size: .72rem; text-transform: uppercase; letter-spacing: .04em; color: #6b7280; }
        .stat .val { font-size: 1.5rem; font-weight: 700; margin-top: .25rem; color: #2563eb; }

        table {
            width: 100%;
            border-collapse: collapse;
            background: #fff;
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 6px 18px rgba(0, 0, 0, .06);
        }
        thead { background: #111827; color: #fff; }
        th, td { text-align: left; padding: .75rem 1rem; font-size: .9rem; }
        tbody tr:nth-child(even) { background: #f9fafb; }
        tbody tr:hover { background: #eff6ff; }

        .empty {
            background: #fff; padding: 2rem; border-radius: 12px;
            text-align: center; color: #6b7280;
        }
        a.back { display: inline-block; margin-top: 1.5rem; color: #2563eb; text-decoration: none; font-weight: 600; }
        a.back:hover { text-decoration: underline; }

        /* Estilos para el botón de descarga */
        a.btn-descarga {
            display: inline-block;
            background-color: #0b2046; /* Azul profundo */
            color: #ffffff;
            padding: 0.6rem 1.2rem;
            text-decoration: none;
            font-weight: 600;
            border-radius: 8px;
            box-shadow: 0 4px 10px rgba(11, 32, 70, 0.2);
            transition: background-color 0.2s ease;
        }
        a.btn-descarga:hover {
            background-color: #061228;
        }

        /* Ajuste menor al botón de regreso para que se alineen bien */
        a.back {
            display: inline-block;
            color: #2563eb;
            text-decoration: none;
            font-weight: 600;
        }
        a.back:hover {
            text-decoration: underline;
        }

        /* Contenedor de acciones finales */
        .acciones {
            display: flex;
            align-items: center;
            gap: 1.5rem;
            margin-top: 1.5rem;
        }
    </style>
</head>
<body>
<div class="wrap">

    <h1>Resultados de la consulta</h1>

    <!-- ============ DATOS CALCULADOS CON LOS HILOS ============ -->
    <div class="stats" th:if="${estadisticas != null}">
        <div class="stat">
            <div class="lbl">Total de registros</div>
            <div class="val" th:text="${estadisticas.totalRegistros}">0</div>
        </div>
        <div class="stat">
            <div class="lbl">Fecha más reciente</div>
            <div class="val" th:text="${estadisticas.fechaMasReciente != null} ? ${estadisticas.fechaMasReciente} : '—'">—</div>
        </div>
        <div class="stat">
            <div class="lbl">Fecha más antigua</div>
            <div class="val" th:text="${estadisticas.fechaMasAntigua != null} ? ${estadisticas.fechaMasAntigua} : '—'">—</div>
        </div>
    </div>

    <!-- ============ TABLA DE VENTAS ============ -->
    <!-- La colección ya viene ordenada por fecha DESC desde VentaService -->
    <table th:if="${ventas != null and !ventas.isEmpty()}">
        <thead>
            <tr>
                <th>Nombre</th>
                <th>Apellido</th>
                <th>Puesto</th>
                <th>Fecha de venta</th>
            </tr>
        </thead>
        <tbody>
            <tr th:each="v : ${ventas}">
                <td th:text="${v.nombre}">—</td>
                <td th:text="${v.apellido}">—</td>
                <td th:text="${v.jobTitle}">—</td>
                <td th:text="${v.fecha}">—</td>
            </tr>
        </tbody>
    </table>

    <!-- Mensaje cuando no hubo resultados -->
    <div class="empty" th:if="${ventas == null or ventas.isEmpty()}">
        No se encontraron ventas para ese empleado en el periodo indicado.
    </div>

    <div class="acciones">
        <a class="btn-descarga" th:href="@{/}">Nueva consulta</a>
        <a class="btn-descarga" th:if="${ventas != null and !ventas.isEmpty()}" th:href="@{/descargar}">
            ⬇ Descargar reporte CSV
        </a>
    </div>
</div>
</body>
</html>
